name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'deploy/**'
      - '.github/workflows/**'
      - 'cmd/**'
      - 'internal/**'
      - 'frontend/**'

env:
  REGISTRY: docker.io
  IMAGE_NAME: xdearboy/netpulse

jobs:
  test:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

  build-and-push:
    needs: test
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: success()
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          kubectl config set-cluster in-cluster --server=https://kubernetes.default.svc --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context default --cluster=in-cluster --user=runner
          kubectl config use-context default

      - name: Check cluster health
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Create namespace
        run: |
          kubectl create namespace netpulse --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply k8s manifests
        run: |
          echo "Applying deployment manifests..."
          kubectl apply -f deploy/namespace.yaml -f deploy/configmap.yaml -f deploy/certificate.yaml -f deploy/deployment.yaml -f deploy/service.yaml -f deploy/hpa.yaml -f deploy/ingress.yaml --validate=false
          kubectl create secret generic netpulse-secrets \
            --namespace=netpulse \
            --from-literal=IPGEOLOCATION_API_KEY="${{ secrets.IPGEOLOCATION_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image
        run: |
          echo "Setting new image..."
          kubectl set image deployment/netpulse \
            netpulse=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n netpulse

      - name: Wait for rollout
        run: |
          echo "Waiting for deployment rollout..."
          kubectl rollout status deployment/netpulse -n netpulse --timeout=600s

      - name: Verify pods
        run: |
          echo "Pod status:"
          kubectl get pods -n netpulse -o wide
          kubectl describe deployment netpulse -n netpulse

      - name: Notify deployment
        if: success()
        run: echo "✅ Deployment successful - ${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, attempting rollback..."
          kubectl rollout undo deployment/netpulse -n netpulse || true
          sleep 10
          kubectl get pods -n netpulse
